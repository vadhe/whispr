# https://moonrepo.dev/docs/config/project
$schema: "../../.moon/cache/schemas/project.json"

language: "go"
layer: "application"

project:
  name: "api"
  description: "template"

tasks:
  build:
    command: "go build -o ./bin/web-api ./cmd/api"
    inputs:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
    outputs:
      - "bin/web-api"

  dev:
    command: "air"
    options:
      cache: false
    inputs:
      - "**/*.go"
      - "go.mod"
      - "go.sum"

  test:
    command: "go test ./..."
    env:
      APP_ENV: "test"
    inputs:
      - "**/*.go"
      - "go.mod"
      - "go.sum"

  test-coverage:
    command: "go test -coverprofile=coverage.out -covermode=atomic ./..."
    env:
      APP_ENV: "test"
    inputs:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
    outputs:
      - "coverage.out"

  lint:
    command: "go vet ./..."
    inputs:
      - "**/*.go"
      - "go.mod"
      - "go.sum"

  format:
    command: "gofmt -w ."
    inputs:
      - "**/*.go"

  tidy:
    command: "go mod tidy"
    inputs:
      - "go.mod"
      - "go.sum"
  migrate-up:
    command: "go run ./cmd/migrate up"
    options:
      cache: false
    inputs:
      - "migrations/**/*.sql"
      - "cmd/migrate/main.go"

  migrate-up-test:
    command: "go run ./cmd/migrate up"
    options:
      cache: false
    env:
      APP_ENV: "test"
    inputs:
      - "migrations/**/*.sql"
      - "cmd/migrate/main.go"

  migrate-down:
    command: "go run ./cmd/migrate down"
    options:
      cache: false
    inputs:
      - "migrations/**/*.sql"
      - "cmd/migrate/main.go"

  migrate-down-test:
    command: "go run ./cmd/migrate down"
    options:
      cache: false
    env:
      APP_ENV: "test"
    inputs:
      - "migrations/**/*.sql"
      - "cmd/migrate/main.go"

  migrate-reset:
    command: "go run ./cmd/migrate reset"
    options:
      cache: false
    inputs:
      - "migrations/**/*.sql"
      - "cmd/migrate/main.go"

  migrate-reset-test:
    command: "go run ./cmd/migrate reset"
    options:
      cache: false
    env:
      APP_ENV: "test"
    inputs:
      - "migrations/**/*.sql"
      - "cmd/migrate/main.go"

  migrate-status:
    command: "go run ./cmd/migrate status"
    options:
      cache: false
    inputs:
      - "migrations/**/*.sql"
      - "cmd/migrate/main.go"

  migrate-status-test:
    command: "go run ./cmd/migrate status"
    options:
      cache: false
    env:
      APP_ENV: "test"
    inputs:
      - "migrations/**/*.sql"
      - "cmd/migrate/main.go"

  migrate-create:
    command: "go run ./cmd/migrate create"
    options:
      cache: false
    inputs:
      - "migrations/**/*.sql"

  seed:
    command: "go run ./cmd/seed"
    options:
      cache: false
    inputs:
      - "cmd/seed/main.go"

  seed-test:
    command: "go run ./cmd/seed"
    options:
      cache: false
    env:
      APP_ENV: "test"
    inputs:
      - "cmd/seed/main.go"

  up:
    command: "docker-compose up -d"
    options:
      cache: false
    inputs:
      - "docker-compose.yaml"

  down:
    command: "docker-compose down"
    options:
      cache: false
    inputs:
      - "docker-compose.yaml"
  get:
    command: "go get"
    options:
      cache: false
  swag:
    command: swag
    args:
      - init
      - -g
      - cmd/api/main.go
      - -o
      - cmd/api/docs
      - --parseInternal
      - --parseDependency
    options:
      cache: false
