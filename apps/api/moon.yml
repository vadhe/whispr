# https://moonrepo.dev/docs/config/project
$schema: "../../.moon/cache/schemas/project.json"

language: "go"
layer: "application"

project:
  name: "api"
  description: "whispr api"

tasks:
  build:
    command: "go build -o ./bin/main ./cmd/api/main.go"
    inputs:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
    outputs:
      - "bin/main"

  dev:
    command: "air"
    options:
      cache: false
    inputs:
      - "**/*.go"
      - "go.mod"
      - "go.sum"

  test:
    command: "go test ./..."
    env:
      APP_ENV: "test"
    inputs:
      - "**/*.go"
      - "go.mod"
      - "go.sum"

  test-coverage:
    command: "go test -coverprofile=coverage.out -covermode=atomic ./..."
    env:
      APP_ENV: "test"
    inputs:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
    outputs:
      - "coverage.out"

  lint:
    command: "go vet ./..."
    inputs:
      - "**/*.go"
      - "go.mod"
      - "go.sum"

  format:
    command: "gofmt -w ."
    inputs:
      - "**/*.go"

  tidy:
    command: "go mod tidy"
    inputs:
      - "go.mod"
      - "go.sum"
  migrate-up:
    command: "goose -dir migrations sqlite3 internal/database/whispr.db up"
    options:
      cache: false

  migrate-up-test:
    command: "go run ./cmd/migrate up"
    options:
      cache: false
    env:
      APP_ENV: "test"
    inputs:
      - "migrations/**/*.sql"
      - "cmd/migrate/main.go"

  migrate-down:
    command: "goose -dir migrations sqlite3 internal/database/whispr.db down"
    options:
      cache: false
