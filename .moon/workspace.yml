# https://moonrepo.dev/docs/config/workspace
$schema: './cache/schemas/workspace.json'

# extends: './shared/workspace.yml'

projects:
  - 'apps/*'
  - 'packages/*'

vcs:
  # The default branch / base.
  defaultBranch: "main"
  hooks:
    pre-commit:
      - "moon run api:build --affected --status=staged"
      - "moon run api:lint --affected --status=staged"
      - "moon run api:format --affected --status=staged"
      - "moon run api:tidy --affected --status=staged"
      - "moon run web:ci --affected --status=staged"
      # - "moon run web:test --affected --status=staged"
      # - "moon run web:build --affected --status=staged"
      # - "moon run web:lint --affected --status=staged"
  # The upstream version control provider, where the repository
  # source code is stored.
  # @since 1.8.0
  # @values "bitbucket" | "github" | "gitlab" | "other"
  provider: "github"
